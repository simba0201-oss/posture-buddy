<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  html, body { background: transparent; margin: 0; overflow: hidden; }
  body {
    font-family: -apple-system, 'Malgun Gothic', sans-serif;
    text-align: center; user-select: none;
    -webkit-app-region: drag;
  }
  .bubble {
    display: inline-block; margin-top: 10px; padding: 10px 22px;
    background: #fff; border-radius: 20px;
    box-shadow: 0 4px 14px rgba(0,0,0,.18);
    font-size: 17px; font-weight: 700; color: #333;
  }
  #count { color: #4a7cff; font-variant-numeric: tabular-nums; }
  #char {
    height: 350px; margin-top: 6px;
    -webkit-user-drag: none;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,.2));
  }
  #skip {
    -webkit-app-region: no-drag;
    margin-top: 8px; padding: 8px 26px;
    border: none; border-radius: 16px;
    background: rgba(80,80,80,.75); color: #fff;
    font-size: 13px; cursor: pointer;
  }
</style>
</head>
<body>
  <div class="bubble"><span id="phaseName">준비</span> · <span id="count">20</span>초</div>
  <br>
  <img id="char" src="assets/neck1.png" alt="">
  <br>
  <button id="skip">오늘은 건너뛰기</button>

<script>
  // ══ 운동별 포즈 프레임 (1초마다 교체) ══
  const phases = [
    { name: '목 스트레칭', frames: ['neck1', 'neck2'] },
    { name: '어깨 돌리기', frames: ['shoulder1', 'shoulder2', 'shoulder3', 'shoulder4'] },
    { name: '허리 펴기',   frames: ['back1', 'back2'] }
  ];
  // 프레임 미리 로드 (교체 시 깜빡임 방지)
  phases.flatMap(p => p.frames).forEach(n => { new Image().src = 'assets/' + n + '.png'; });

  const SEC = 20, FRAME_MS = 1000;
  let idx = 0, remain = SEC, frameIdx = 0;

  const charEl = document.getElementById('char');
  const nameEl = document.getElementById('phaseName');
  const countEl = document.getElementById('count');

  function setPhase(i) {
    nameEl.textContent = phases[i].name;
    remain = SEC;
    countEl.textContent = remain;
    frameIdx = 0;
  }

  const framer = setInterval(() => {
    const f = phases[idx].frames;
    charEl.src = 'assets/' + f[frameIdx % f.length] + '.png';
    frameIdx++;
  }, FRAME_MS);

  const timer = setInterval(() => {
    remain--;
    countEl.textContent = remain;
    if (remain <= 0) {
      idx++;
      if (idx >= phases.length) { finish(); return; }
      setPhase(idx);
    }
  }, 1000);

  function finish() {
    clearInterval(timer);
    clearInterval(framer);
    document.querySelector('.bubble').textContent = '수고했어요! 💪';
    setTimeout(() => window.api.closeExercise(), 1500);
  }

  document.getElementById('skip').addEventListener('click', () => {
    clearInterval(timer);
    clearInterval(framer);
    window.api.closeExercise();
  });

  function chime() {
    const ctx = new AudioContext();
    [[880, 0], [660, 0.25], [880, 0.7], [660, 0.95]].forEach(([freq, delay]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.6, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + delay + 0.5);
      osc.connect(gain).connect(ctx.destination);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.5);
    });
  }

  chime();
  setPhase(0);
</script>
</body>
</html>
